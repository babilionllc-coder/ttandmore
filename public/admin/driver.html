<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Traslados — TT&More Conductor</title>
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TT Driver">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a12'/%3E%3Ctext x='50' y='62' font-size='36' text-anchor='middle' fill='%2322c55e' font-weight='bold'%3ETT%3C/text%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--card:#13131d;--border:#1e1e2e;--purple:#a78bfa;--green:#22c55e;--red:#ef4444;--yellow:#facc15;--blue:#60a5fa;--text1:#f1f1f1;--text2:#9ca3af;--text3:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;padding-bottom:80px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar .logo{color:var(--green);font-weight:800}
.driver-name{font-size:13px;color:var(--text2);font-weight:400}
.top-actions{display:flex;align-items:center;gap:8px}
.lang-toggle{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.03em}
.lang-toggle:active{background:var(--border)}
.lang-toggle .active-lang{color:var(--purple)}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.refresh-btn:active{background:var(--border)}
.refresh-btn svg{width:16px;height:16px}

.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.error-msg{text-align:center;padding:40px 20px;color:var(--red)}
.error-msg a{color:var(--purple)}

.section-title{padding:16px 20px 8px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.section-title span{color:var(--purple)}

.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:14px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:8px 16px;padding:16px;position:relative;overflow:hidden}
.card.soon{border-left:3px solid var(--purple)}
.card.active{border-left:3px solid var(--green);background:linear-gradient(135deg,rgba(34,197,94,.05),transparent)}
.card-status{position:absolute;top:12px;right:12px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.s-pendiente{background:rgba(250,204,21,.12);color:var(--yellow)}
.s-confirmado{background:rgba(96,165,250,.12);color:var(--blue)}
.s-en-proceso,.s-en-camino{background:rgba(34,197,94,.12);color:var(--green)}
.s-completado{background:rgba(107,114,128,.12);color:var(--text3)}
.s-cancelado{background:rgba(239,68,68,.12);color:var(--red)}

.card-time{font-size:28px;font-weight:800;color:var(--text1);margin-bottom:2px;font-variant-numeric:tabular-nums}
.card-date{font-size:13px;color:var(--text3);margin-bottom:12px}
.card-route{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-route .from,.card-route .to{font-size:14px;font-weight:600}
.card-route .arrow{color:var(--purple);font-size:18px}

.card-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.card-detail{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.card-detail svg{width:14px;height:14px;flex-shrink:0;color:var(--text3)}
.card-detail strong{color:var(--text1);font-weight:600}

.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.card-actions a,.card-actions button{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:active{background:#1da851}
.btn-nav{background:var(--border);color:var(--text1)}
.btn-nav:active{background:var(--text3)}

.vehicle-badge{display:inline-flex;align-items:center;gap:4px;background:var(--border);padding:3px 10px;border-radius:6px;font-size:12px;color:var(--text2);margin-bottom:10px}

.summary{display:flex;gap:12px;padding:12px 16px;overflow-x:auto}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:100px;text-align:center;flex-shrink:0}
.summary-card .num{font-size:24px;font-weight:800;color:var(--text1)}
.summary-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

.select-driver{text-align:center;padding:60px 20px}
.select-driver h2{font-size:20px;margin-bottom:8px}
.select-driver p{color:var(--text2);margin-bottom:20px;font-size:14px}
.driver-list{display:flex;flex-direction:column;gap:8px;max-width:320px;margin:0 auto}
.driver-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;color:var(--text1);font-size:15px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px}
.driver-btn:active{background:var(--border)}
.driver-btn .avatar{width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="logo">TT</span>&More <span class="driver-name" id="driverName"></span></h1>
  <div class="top-actions">
    <button class="lang-toggle" id="langBtn" onclick="toggleLang()">
      <span id="langLabel">ES</span> / <span>EN</span>
    </button>
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</div>

<div id="app">
  <div class="loading" id="loader">
    <div class="spinner"></div>
    <div>Cargando traslados...</div>
  </div>
</div>

<script>
// ── i18n ──
const T = {
  es: {
    title: 'Mis Traslados — TT&More Conductor',
    loading: 'Cargando traslados...',
    refresh: 'Actualizar',
    selectTitle: 'Selecciona Tu Perfil',
    selectSub: 'Elige tu nombre para ver tus traslados asignados',
    today: 'Hoy',
    tomorrow: 'Mañana',
    upcoming: 'Próximos',
    noToday: 'Sin traslados hoy',
    noTomorrow: 'Sin traslados mañana',
    airport: 'Aeropuerto',
    noName: 'Sin nombre',
    pax: 'pax',
    whatsapp: 'WhatsApp',
    navigate: 'Navegar',
    waMsg: (name) => `Hola ${name}, soy tu conductor de TT&More. ¡Ya voy en camino!`,
    errorLoad: 'Error al cargar traslados',
    errorDrivers: 'Error al cargar conductores',
    goAdmin: 'Ir al panel admin',
    driver: 'Conductor',
    daysShort: ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
    monthsShort: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
  },
  en: {
    title: 'My Transfers — TT&More Driver',
    loading: 'Loading transfers...',
    refresh: 'Refresh',
    selectTitle: 'Select Your Profile',
    selectSub: 'Choose your name to see your assigned transfers',
    today: 'Today',
    tomorrow: 'Tomorrow',
    upcoming: 'Upcoming',
    noToday: 'No transfers today',
    noTomorrow: 'No transfers tomorrow',
    airport: 'Airport',
    noName: 'No name',
    pax: 'pax',
    whatsapp: 'WhatsApp',
    navigate: 'Navigate',
    waMsg: (name) => `Hello ${name}, this is your TT&More driver. I'm on my way!`,
    errorLoad: 'Error loading transfers',
    errorDrivers: 'Failed to load drivers',
    goAdmin: 'Go to admin panel',
    driver: 'Driver',
    daysShort: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    monthsShort: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
  }
};

let LANG = localStorage.getItem('tt_driver_lang') || 'es';
function t(key) { return T[LANG]?.[key] || T.en[key] || key; }

function toggleLang() {
  LANG = LANG === 'es' ? 'en' : 'es';
  localStorage.setItem('tt_driver_lang', LANG);
  document.documentElement.lang = LANG;
  document.title = t('title');
  updateLangBtn();
  loadData();
}

function updateLangBtn() {
  const btn = document.getElementById('langLabel');
  if (btn) btn.textContent = LANG.toUpperCase();
}

// ── API ──
const API = '/api/airtable';
const CACHE = {};

async function fetchTable(table, params = {}) {
  const qs = new URLSearchParams({ table, ...params });
  let all = [];
  let offset = '';
  do {
    if (offset) qs.set('offset', offset);
    const r = await fetch(`${API}?${qs}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || d.error);
    all = all.concat(d.records || []);
    offset = d.offset || '';
  } while (offset);
  return all;
}

function f(rec, field) { return rec?.fields?.[field] || ''; }

function fmtTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return d.toLocaleTimeString(LANG === 'es' ? 'es-MX' : 'en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${t('daysShort')[d.getDay()]}, ${t('monthsShort')[d.getMonth()]} ${d.getDate()}`;
}

function statusClass(s) {
  const map = {'Pendiente':'s-pendiente','Confirmado':'s-confirmado','En Proceso':'s-en-proceso','En Camino':'s-en-camino','Completado':'s-completado','Cancelado':'s-cancelado'};
  return map[s] || 's-pendiente';
}

function waLink(phone, name) {
  if (!phone) return '';
  const clean = phone.replace(/\D/g, '');
  const num = clean.startsWith('52') ? clean : '52' + clean;
  return `https://wa.me/${num}?text=${encodeURIComponent(t('waMsg')(name))}`;
}

function mapsLink(hotel) {
  if (!hotel) return '';
  return `https://maps.google.com/maps?q=${encodeURIComponent(hotel + ', Cancun, Mexico')}`;
}

function getDriverId() {
  return new URLSearchParams(window.location.search).get('id');
}

function getDriverName() {
  return new URLSearchParams(window.location.search).get('name') || '';
}

async function showDriverPicker() {
  const app = document.getElementById('app');
  try {
    const drivers = await fetchTable('Conductores');
    CACHE.drivers = drivers;
    app.innerHTML = `
      <div class="select-driver">
        <h2>${t('selectTitle')}</h2>
        <p>${t('selectSub')}</p>
        <div class="driver-list">
          ${drivers.map(d => {
            const name = f(d, 'Nombre completo');
            const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
            return `<button class="driver-btn" onclick="selectDriver('${d.id}','${name.replace(/'/g,"\\'")}')">
              <div class="avatar">${initials}</div>
              ${name}
            </button>`;
          }).join('')}
        </div>
      </div>
    `;
  } catch(e) {
    app.innerHTML = `<div class="error-msg">${t('errorDrivers')}: ${e.message}</div>`;
  }
}

function selectDriver(id, name) {
  const url = new URL(window.location);
  url.searchParams.set('id', id);
  url.searchParams.set('name', name);
  window.history.replaceState({}, '', url);
  loadData();
}

async function loadData() {
  const driverId = getDriverId();
  if (!driverId) return showDriverPicker();

  const driverNameEl = document.getElementById('driverName');
  driverNameEl.textContent = '— ' + (getDriverName() || t('driver'));

  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div><div>${t('loading')}</div></div>`;

  try {
    const [reservas, vehicles] = await Promise.all([
      fetchTable('Reservas'),
      fetchTable('Vehículos'),
    ]);
    CACHE.reservas = reservas;
    CACHE.vehicles = vehicles;

    // Filter reservas assigned to this driver
    const mine = reservas.filter(r => {
      const linked = r.fields['Conductor Asignado'];
      return Array.isArray(linked) && linked.includes(driverId);
    });

    mine.sort((a, b) => {
      const da = new Date(f(a, 'Arrival Date Time') || '2099-01-01');
      const db = new Date(f(b, 'Arrival Date Time') || '2099-01-01');
      return da - db;
    });

    const now = new Date();
    const todayStr = now.toISOString().slice(0, 10);
    const tomorrowDate = new Date(now);
    tomorrowDate.setDate(tomorrowDate.getDate() + 1);
    const tomorrowStr = tomorrowDate.toISOString().slice(0, 10);

    const today = mine.filter(r => {
      const d = (f(r, 'Arrival Date Time') || '').slice(0, 10);
      return d === todayStr && f(r, 'Estado del Servicio') !== 'Cancelado';
    });
    const tomorrow = mine.filter(r => {
      const d = (f(r, 'Arrival Date Time') || '').slice(0, 10);
      return d === tomorrowStr && f(r, 'Estado del Servicio') !== 'Cancelado';
    });
    const upcoming = mine.filter(r => {
      const d = (f(r, 'Arrival Date Time') || '').slice(0, 10);
      return d > tomorrowStr && f(r, 'Estado del Servicio') !== 'Cancelado';
    });

    function vehicleName(r) {
      const vIds = r.fields['Vehículo Asignado'];
      if (!Array.isArray(vIds) || !vIds.length) return '';
      const v = vehicles.find(v => v.id === vIds[0]);
      return v ? `${f(v, 'Nombre del Vehículo')} (${f(v, 'Tipo de Vehículo')})` : '';
    }

    function renderCard(r, highlight) {
      const status = f(r, 'Estado del Servicio') || 'Pendiente';
      const name = `${f(r, 'Titular Name')} ${f(r, 'Titular Last Name')}`.trim();
      const phone = f(r, 'Telefono Titular');
      const hotel = f(r, 'Hotel');
      const dest = f(r, 'Destino - Tarifa');
      const terminal = f(r, 'Terminal');
      const flight = f(r, 'Flight #');
      const pax = f(r, 'Passengers - Selector');
      const vehicle = vehicleName(r);
      const arrivalISO = f(r, 'Arrival Date Time');
      const wa = waLink(phone, name);
      const maps = mapsLink(hotel || dest);

      return `
        <div class="card ${highlight}">
          <div class="card-status ${statusClass(status)}">${status}</div>
          <div class="card-time">${fmtTime(arrivalISO)}</div>
          <div class="card-date">${fmtDate(arrivalISO)}</div>
          <div class="card-route">
            <span class="from">${terminal || t('airport')}</span>
            <span class="arrow">&rarr;</span>
            <span class="to">${hotel || dest || '—'}</span>
          </div>
          ${vehicle ? `<div class="vehicle-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> ${vehicle}</div>` : ''}
          <div class="card-details">
            <div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <strong>${name || t('noName')}</strong></div>
            <div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg> ${pax || '—'} ${t('pax')}</div>
            ${flight ? `<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5 5 3 -2 2-2-1-1 .5 2.5 2.5 .5-1-1-2 2-2 3 5 .5-.3c.4-.2.6-.6.5-1.1z"/></svg> ${flight}</div>` : ''}
            ${dest ? `<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${dest}</div>` : ''}
          </div>
          <div class="card-actions">
            ${wa ? `<a href="${wa}" target="_blank" class="btn-wa"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.116.553 4.105 1.516 5.832L.051 23.579a.5.5 0 00.62.62l5.747-1.465A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg> ${t('whatsapp')}</a>` : ''}
            ${maps ? `<a href="${maps}" target="_blank" class="btn-nav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg> ${t('navigate')}</a>` : ''}
          </div>
        </div>
      `;
    }

    const totalToday = today.length;
    const totalTomorrow = tomorrow.length;
    const totalUpcoming = upcoming.length;

    let html = `
      <div class="summary">
        <div class="summary-card"><div class="num" style="color:var(--green)">${totalToday}</div><div class="label">${t('today')}</div></div>
        <div class="summary-card"><div class="num" style="color:var(--purple)">${totalTomorrow}</div><div class="label">${t('tomorrow')}</div></div>
        <div class="summary-card"><div class="num">${totalUpcoming}</div><div class="label">${t('upcoming')}</div></div>
      </div>
    `;

    html += `<div class="section-title">${t('today')} — <span>${todayStr}</span></div>`;
    if (today.length) {
      html += today.map(r => renderCard(r, 'active')).join('');
    } else {
      html += `<div class="empty">${t('noToday')}</div>`;
    }

    html += `<div class="section-title">${t('tomorrow')} — <span>${tomorrowStr}</span></div>`;
    if (tomorrow.length) {
      html += tomorrow.map(r => renderCard(r, 'soon')).join('');
    } else {
      html += `<div class="empty">${t('noTomorrow')}</div>`;
    }

    if (upcoming.length) {
      html += `<div class="section-title">${t('upcoming')}</div>`;
      html += upcoming.slice(0, 10).map(r => renderCard(r, '')).join('');
    }

    app.innerHTML = html;

  } catch(e) {
    app.innerHTML = `<div class="error-msg">${t('errorLoad')}: ${e.message}<br><br><a href="/admin/">${t('goAdmin')}</a></div>`;
  }
}

// Auto-refresh every 2 minutes
setInterval(() => { if (getDriverId()) loadData(); }, 120000);

// Init
updateLangBtn();
loadData();
</script>
</body>
</html>
